apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinic-app
  labels:
    app: clinic
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clinic
  template:
    metadata:
      labels:
        app: clinic
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      containers:
      - name: clinic-container
        image: your-dockerhub-username/green-valley-clinic:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        # Add other environment variables as secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: clinic-service
spec:
  selector:
    app: clinic
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
